name: Build and Push Docker Image

on:
  push:
    branches: [ main ]


jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/chatbot-api:latest ./new_project/api

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/chatbot-api:latest

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/chatbot-api:latest
          docker stop chatbot || true
          docker rm chatbot || true
          docker run -d \
            --name chatbot \
            -p 8010:8010 \
            --env-file /home/ubuntu/chatbot/.env \
            -v /home/ubuntu/chatbot/user_chat_logs:/app/user_chat_logs \
            ${{ secrets.DOCKER_USERNAME }}/chatbot-api:latest